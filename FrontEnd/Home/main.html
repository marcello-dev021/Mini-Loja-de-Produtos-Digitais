<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DigitalHub — Produtos Digitais</title>
  <link rel="stylesheet" href="style.css" />
  
  <link rel="icon" href="favicon.ico" type="" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-inner">
      <div class="logo">Digital<span>Hub</span></div>
      <ul class="nav-links">
        <li><a href="#">Cursos</a></li>
        <li><a href="#">Ebooks</a></li>
        <li><a href="#">Bundles</a></li>
        <li><a href="#">Sobre</a></li>
      </ul>
      <div class="nav-actions">
        <button class="btn-ghost-sm" id="btn-search">Buscar</button>
        <button class="btn-cart" id="btn-cart">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          <span id="cart-count">0</span>
        </button>
      </div>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-inner">
      <div class="hero-tag">Plataforma de produtos digitais</div>
      <h1>Conhecimento que<br /><em>transforma</em></h1>
      <p class="hero-sub">Cursos e ebooks criados por especialistas.<br />Aprenda no seu ritmo, onde quiser.</p>
      <div class="hero-actions">
        <button class="btn-primary" onclick="document.getElementById('produtos').scrollIntoView({behavior:'smooth'})">Explorar produtos</button>
        <button class="btn-outline">Como funciona</button>
      </div>
      <div class="hero-stats">
        <div class="stat"><span class="stat-num" id="stat-produtos">—</span><span class="stat-label">Produtos</span></div>
        <div class="stat-divider"></div>
        <div class="stat"><span class="stat-num">4.9</span><span class="stat-label">Avaliação média</span></div>
        <div class="stat-divider"></div>
        <div class="stat"><span class="stat-num">+2k</span><span class="stat-label">Alunos</span></div>
      </div>
    </div>
    <div class="hero-glow"></div>
  </section>

  <!-- FILTROS -->
  <section class="filters-bar" id="produtos">
    <div class="filters-inner">
      <button class="filter-btn active" data-filter="todos">Todos</button>
      <button class="filter-btn" data-filter="curso">Cursos</button>
      <button class="filter-btn" data-filter="ebook">Ebooks</button>
      <button class="filter-btn" data-filter="bundle">Bundles</button>
    </div>
  </section>

  <!-- PRODUTOS -->
  <section class="products-section">
    <div class="products-inner">
      <div class="products-header">
        <h2>Em destaque</h2>
        <span class="products-count" id="products-count"></span>
      </div>
      <div class="products-grid" id="products-grid">
        <!-- Skeleton loading -->
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
      </div>
    </div>
  </section>

  <!-- TOAST -->
  <div class="toast" id="toast">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
    <span id="toast-msg">Adicionado ao carrinho!</span>
  </div>

  <script src="main.js"></script>
</body>
</html>
